<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 정보</title>

    <!-- CSS 파일에 대한 링크 경로 역시 @{}로 감싸는 것을 권장(컨텍스트 경로 자동 추가) -->
    <link rel="stylesheet" th:href="@{/css/member.css}">
</head>
<body>
    <ul>
        <li th:text="${member.name}"></li>
        <li th:text="${member.email}"></li>
        <li th:text="${member.age}"></li>
    </ul>
</body>
</html>
